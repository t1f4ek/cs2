

say "Горячие клавиши: f1 (Предыдущий спавн), f2 (Текущий спавн), f3 (Следующий спавн)"

// CT Spawns positions
alias "spawn0" "setpos_exact 2472.349854 2005.969971 134.505051"
alias "spawn1" "setpos_exact 2353.000000 1977.000000 135.518875"
alias "spawn2" "setpos_exact 2292.060059 2027.689941 135.956955"
alias "spawn3" "setpos_exact 2493.000000 2090.000000 132.551376"
alias "spawn4" "setpos_exact 2397.000000 2079.000000 132.767548"
alias "spawn5" "setpos_exact 2456.830078 2153.159912 132.077179" 
 
alias spawn_next spawn_next0
alias spawn_prev spawn_prev0
alias spawn_same spawn0
 
// CT Spawns aliases 
alias spawn_next0 "spawn0; alias spawn_prev spawn_prev5; alias spawn_same spawn0; alias spawn_next spawn_next1; say Spawn 1 CT"
alias spawn_prev0 "spawn0; alias spawn_prev spawn_prev5; alias spawn_same spawn0; alias spawn_next spawn_next1; say Spawn 1 CT"
 
alias spawn_next1 "spawn1; alias spawn_prev spawn_prev0; alias spawn_same spawn1; alias spawn_next spawn_next2; say Spawn 2 CT"
